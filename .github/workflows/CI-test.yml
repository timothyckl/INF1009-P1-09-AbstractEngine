name: CI Pipeline

# Trigger the pipeline on pushes to your specific test branch and main/develop,
# and on pull requests targeting main/develop.
on:
  push:
    branches: [ "main", "test/ci-pipeline" ] # test/ci-pipeline can be safely removed
  pull_request:
    branches: [ "main", "test/ci-pipeline" ] # any integration branches will need to be manually added in here, for now, the .yml is treating main as the sole integration branch

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8' # Matches your project's sourceCompatibility
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Project
      run: ./gradlew build -x test --warning-mode all

    - name: Run Automated Unit Tests
      run: ./gradlew core:test
